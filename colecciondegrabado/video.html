<p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0">Los videos que se presentan hacen parte de los sistemas de producción de obra gráfica realizados en el Taller de Grabado de la Facultad de Artes por algunos docentes del Area Gáfica del Depto. de Artes Visuales, y un estudiante de la carrera de Artes Plásticas de la misma dependencia. Se trata de video-clips realizados por el estudiante Carlos Andrés Londoño, integrante del Grupo MIRA.</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0">El objetivo de este trabajo es permitir el conocimiento de algunos procesos básicos de impresión artística, sin interés en profundizar en el tema, más bien para informar y entender como funcionan. Es importante resaltar también que estos sistemas se diferencian sustancialmente de la producción industrial, en cuanto a la dotación de equipos y maquinaria, procesos de trabajo y objetivos de consumo. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0">No es del interés de un artista por ejemplo, la obtención de altos tirajes si no dispone de un sistema operativo y de aplicación de las leyes de la oferta y la demanda, que permita el éxito de sus intenciones. Los circuitos para los artistas están abiertos principalmente en las convocatorias internacionales, exposiciones, premios, bienales, museos y galerías, ediciones para coleccionistas, ferias de libros de arte, intercambios, producción de talleres independientes, etc.</font></p><p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0">Casos excepcionales han ocurrido en la Historia del Arte como Andy Warhol y Robert Rauchemberg, que dentro del movimiento del pop art norteamericano difundieron su obra a través de procesos industrializados pero no solo en los circuitos artísticos, sino como productos de consumo. &nbsp;</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0">En la gráfica contemporánea es muy interesante el caso de Antoni Tápies, que trabaja en la producción de su obra, con la editorial Polígrafa de Barcelona, en una estrecha relación de artista con impresor. &nbsp;</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="12" color="#003366" letterSpacing="0.000000" kerning="0">En todo caso lo importante es destacar el aprecio y valor que tiene hoy en día la gráfica artística en todo el mundo; desafortunadamente en nuestro país, carece de la &nbsp;acogida que se merece por consideraciones que nada tienen que ver con su calidad estética y valores agregados adicionales, como las inmensas posibilidades de difusión, bajo costo y facilidades de transporte.</font></p>
<p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"><b>PROCESO - GRABADO EN METAL</b></font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">(policromía con una matriz-Viscosidad Hayter)</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">El grabado fue realizado por el docente Hernando Guerrero, del Depto. de Artes Visuales. Se trata de la obtención de una policromía utilizando solo una matriz y con una única pasada por la prensa. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">La acción del ácido y su grado de penetración en el metal son relativamente iguales al sistema precedente, pero la diferencia radica en la exposición a mayores tiempos de corrosión por capas o terrazas: unas muy profundas, otras intermedias y las zonas de la superficie del metal.</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Esta diferenciación de niveles hace posible la penetración progresiva de las tintas, aprovechando el fenómeno físico químico de la capilaridad de líquidos, que utilizados en densidades de distinta viscosidad, no se mezclan; igualmente en la fase de entintado, por las características de mayor, mediana y menor dureza de los rodillos entintadores. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Los blandos, que tienen mayor capacidad de penetración actúan en aquellas zonas mas profundas, mientras que los medianos y duros, penetran en sus respectivos sectores. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Del mismo modo en fase de impresión el soporte de papel utilizado debe ser de un gramaje no inferior a 200 gr. y resistente a la humedad, con el fin de obtener ejemplares únicos, ricos de color y textura, denominados originales múltiples, pues resulta muy difícil realizar una edición homogénea. </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">&nbsp;</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">El resultado es una policromía que posibilita la experimentación y acercamiento con el lenguaje del color, una de las características mas importantes en el arte visual. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Sir William Hayter en su famoso Atelier 17 de París, ha sido el mas grande impulsor de estos sistemas.</font></p><p align="justify"></p>
<p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"><b>PROCESO - GRABADO EN RELIEVE</b></font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">(policromía con matriz de poliuretano)</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Este grabado de gran formato fue realizado por el estudiante Camilo Velásquez, de la carrera de Artes Plásticas. Utilizó como matriz una lámina de poliuretano (PBC) elaborada por el mismo. Las ventajas de este material son su ductilidad (comparativamente mayor que el "neolite" o linoleo) lo que permite cortes precisos e incisiones de largos recorridos.</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Los métodos de intervención en las matrices se diferencian radicalmente con el grabado en metal; el ácido no es necesario y las herramientas, llamadas gubias, se usan para desbastar, cortar y producir líneas y zonas de bajo relieve, que serán en la fase de impresión los blancos de la superficie del papel, quedando la tinta depositada por medio de rodillos entintadores, solo en la superficie. Luego, el contacto del papel con la superficie de la matriz entintada permitirá la obtención del grabado.</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Es interesante observar como utilizando una sola matriz se pueden obtener también policromías de gran belleza expresiva; solo que a diferencia del sistema anterior, cada color se obtiene a través de sucesivas intervenciones en la matriz, hasta que finalmente por el último color, ha perdido su forma original, quedando reducida solo a unas pocas líneas y en muchos casos, inservible. Se podría argumentar que generó vida después de cumplir con su ciclo reproductivo, como el caso de algunos insectos, que mueren después de su acoplamiento sexual..</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Adicionalmente el papel se puede entintar previamente a fin de obtener mayor número de colores; dicho soporte pasa por la prensa sin necesidad de humedecerlo y a baja presión, aunque se utilizan también procesos manuales, sobre todo en aquellos casos de estampa en grandes formatos. &nbsp;</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Estos sistemas han tenido gran acogida en el medio artístico, debido a la economía por el bajo costo de las matrices, la utilización de diversos tipos y soportes de papel, pero sobre todo por su funcionalidad en cuanto al uso de sistemas manuales de impresión, lo que supone grandes ventajas, que por fortuna los artistas han sabido aprovechar. </font></p><p align="justify"></p>
<p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"><b>PROCESO - &nbsp;SERIGRAFÍA</b></font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">(impresión por tamizado)</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Proceso realizado por el docente Jorge Mario Villada, del Depto. de Artes Visuales. A diferencia de los anteriores, este antiquísimo sistema de impresión inventado por los chinos y japoneses con sus famosos estarcidos, después sustituidos por las pantallas de seda, da como resultado la obtención de la imagen a través de sustitutos industriales de dicho material. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Posteriormente y en relativo corto tiempo este medio logró un auge inusitado por la economía, versatilidad y rapidez para obtener altos tirajes; esto favoreció mucho la producción industrial para el consumo masivo.</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Igualmente muchos artistas han utilizado la serigrafía para la difusión su obra gráfica; los artistas norteamericanos citados anteriormente y otros como Lichtenstein y Wasselmman, interesados en la cultura urbana, encontraron en este medio el vehículo mas eficaz para la reproducción de sus temas: colores planos y brillantes, nitidez en la imagen, posibilidad de usar procesos de fotomecánica, diversidad de papeles y otros soportes, grandes formatos, etc. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">En este caso la tinta pasa por el tamiz empujada por una rasqueta, solo por aquellas zonas donde la seda previamente tensada, ha &nbsp;permanecido destapada; los otros sectores al quedar taponados, ya sea por intervenciones manuales o mediante emulsiones fotográficas, impiden su paso.</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">En este ejercicio el artista decidió utilizar los estarcidos de papel (plantillas) para realizar la demostración; vale la pena destacar que por cada color es imprescindible utilizar una plantilla distinta, lo cual supone una ardua labor, en caso de obtención de policromías a ocho o diez tintas. &nbsp;&nbsp;&nbsp;</font></p><p align="justify"></p>
<p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"><b>PROCESO - LITOGRAFÍA</b></font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">(Impresión &nbsp;planográfica)</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Aprovechando el intercambio realizado entre el Taller Experimental de Gráfica de La Habana y la Facultad de Artes, se realizó un curso intensivo de Litografía en el Taller de Grabado de la Facultad, que fue realizado en marzo de 2004 por el conocido artista cubano Carlos Del Toro y el impresor Pedro Redonet. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Durante su desarrollo fue muy relevante observar el trabajo en equipo entre el artista y el impresor durante las distintas fases de este complicado proceso; Carlos, en el apoyo teórico y de orientación en la estética y calidad de la imagen y Pedro, en los procesos mas relacionados con la técnica.</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0"> </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">La imagen se dibuja o pinta directamente sobre la superficie de la piedra, previamente pulimentada. A diferencia de los sistemas de impresión en hueco y en relieve, este proceso se basa en un fenómeno químico de repulsión entre la grasa y el agua; aquellas zonas dibujadas o pintadas atraen la tinta, mientras que el resto de la superficie la repele por estar cubierta de agua. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Para el dibujo directo sobre la matriz se utilizan lápices litográficos que permiten crear variedad de valores de grises; también se usa la tinta litográfica (touché) para trazos a modo de pinceladas o zonas de aguadas, de gran detalle y resolución. &nbsp;</font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Una vez obtenida la imagen se procede a su fijado en la matriz mediante soluciones de ácido y goma arábiga, trementina, agua y asfalto. El entintado se hace con rodillos que actúan sobre la imagen cargándola de tinta. &nbsp;Se coloca el papel en la prensa, se aplica presión y se obtienen las primeras pruebas, llamadas de estado. </font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">&nbsp;</font></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">Hay un método alterno, el offset o impresión indirecta, llamado así porque la estampa no se obtiene por el contacto directo entre la matriz y el papel, sino a través de un rodillo, que recoge la impresión de la matriz y después la transfiere al papel. </font></p><p align="justify"></p><p align="justify"><font face="Verdana" size="11" color="#003366" letterSpacing="0.000000" kerning="0">La característica principal de la litografía es la fidelidad de las imágenes; no hay detalle ni tonalidad por pequeña o sutil &nbsp;que sea, que no quede registrada en la obra definitiva; igualmente permite tirajes mas altos que los procedimientos precedentes, a excepción de la serigrafía o "silk screen". &nbsp;&nbsp;</font></p><p align="justify"></p><p align="justify"></p>
